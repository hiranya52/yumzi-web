<nav
  class="sticky top-6 mx-auto w-[92%] rounded-full z-50 bg-white/70 backdrop-blur-lg no-border shadow-2xl shadow-green-500/10 flex justify-between items-center px-8 py-3 max-w-7xl">

  <div class="text-3xl font-black text-green-600 dark:text-green-400 italic font-['Plus_Jakarta_Sans'] tracking-tight">
    Yumzi
  </div>

  <div class="hidden md:flex gap-8 items-center">
    <a class="text-green-600 dark:text-green-400 font-extrabold hover:scale-105 hover:text-green-500 transition-all duration-300"
      href="#">Dry Fruits</a>
    <a class="text-gray-800 dark:text-green-100 font-medium hover:scale-105 hover:text-green-500 transition-all duration-300"
      href="#">Benefits</a>
    <a class="text-gray-800 dark:text-green-100 font-medium hover:scale-105 hover:text-green-500 transition-all duration-300"
      href="#">Healthy Picks</a>
  </div>

  <button
    class="bg-primary text-on-primary px-6 py-2 rounded-full font-bold scale-105 active:scale-95 transition-transform">
    Shop Now
  </button>
</nav>


<div [style.backgroundColor]="selectedDryFruit.bgColor"
  class="min-h-screen flex items-center justify-center p-4 transition-colors duration-700">

  <main class="flex flex-col md:flex-row items-center px-12 pb-16 relative">

    <!-- LEFT CONTENT -->
    <div class="md:w-1/2 z-10 space-y-6">

      <h1 [style.color]="selectedDryFruit.color"
        class="text-7xl font-extrabold leading-tight transition-all duration-500">
        {{ selectedDryFruit.name }}
      </h1>

      <div class="flex items-center space-x-1 text-yellow-400 text-xl">
        <span>★</span><span>★</span><span>★</span><span>★</span><span>★</span>
      </div>

      <div class="text-3xl font-bold text-gray-800">
        $ {{ selectedDryFruit.price }}
      </div>

      <p class="text-gray-500 max-w-sm leading-relaxed min-h-20">
        {{ selectedDryFruit.description }}
      </p>

      <button
        [style.backgroundColor]="selectedDryFruit.color"
        class="text-white px-8 py-3 rounded-xl font-bold transition-all shadow-lg hover:brightness-110 active:scale-95">
        Order Now
      </button>

      <!-- THUMBNAILS -->
      <div class="flex space-x-4 mt-12">
        <img *ngFor="let dryFruit of dryFruits"
          [src]="dryFruit.image"
          (click)="selectDryFruit(dryFruit)"
          [ngClass]="{'border-4 border-white shadow-xl scale-110': selectedDryFruit === dryFruit}"
          class="w-16 h-16 rounded-full cursor-pointer object-cover transition-all hover:scale-105"
          [alt]="dryFruit.name">
      </div>
    </div>

    <!-- RIGHT IMAGE -->
    <div class="md:w-1/2 flex justify-center relative mt-12 md:mt-0">

      <div [style.backgroundColor]="selectedDryFruit.blobColor"
        class="absolute inset-0 rounded-full blur-3xl z-0 scale-125 transition-colors duration-700">
      </div>

      <img [src]="selectedDryFruit.image"
        class="w-105 h-105 object-contain drop-shadow-2xl z-10 transition-all duration-500 transform rotate-12 hover:rotate-0"
        [alt]="selectedDryFruit.name">
    </div>

  </main>
</div>
