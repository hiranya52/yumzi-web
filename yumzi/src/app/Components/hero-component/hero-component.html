<nav
  class="fixed top-0 left-0 right-0 z-100 mx-auto w-full bg-white/60 backdrop-blur-xl border-b border-white/20 flex justify-between items-center px-6 md:px-12 py-4 transition-all duration-500">

  <div class="text-3xl font-black italic tracking-tighter" [style.color]="selectedDryFruit.color">
    Yumzi.
  </div>

  <div class="hidden md:flex gap-10 items-center">
    <a class="text-sm font-bold uppercase tracking-widest hover:opacity-70 transition-opacity" [style.color]="selectedDryFruit.color" href="#">Products</a>
    <a class="text-sm font-bold uppercase tracking-widest text-gray-600 hover:text-black transition-colors" href="#">Benefits</a>
    <a class="text-sm font-bold uppercase tracking-widest text-gray-600 hover:text-black transition-colors" href="#">Our Story</a>
  </div>

  <button
    [style.backgroundColor]="selectedDryFruit.color"
    class="text-white px-7 py-2.5 rounded-full font-bold shadow-lg shadow-black/5 hover:scale-105 active:scale-95 transition-all">
    Shop Now
  </button>
</nav>

<div
  [style.backgroundColor]="selectedDryFruit.bgColor"
  class="min-h-screen flex items-center justify-center pt-20 px-6 transition-colors duration-1000 ease-in-out overflow-hidden">

  <main class="max-w-7xl w-full grid grid-cols-1 md:grid-cols-2 gap-12 items-center relative">

    <div class="relative z-10 order-2 md:order-1">
      <span
        [style.color]="selectedDryFruit.color"
        class="inline-block px-4 py-1 rounded-full bg-white/50 text-xs font-black uppercase tracking-[0.2em] mb-4">
        Premium Quality
      </span>

      <h1
        [style.color]="selectedDryFruit.color"
        class="text-6xl md:text-8xl font-black leading-[0.9] mb-6 drop-shadow-sm transition-all duration-700">
        {{ selectedDryFruit.name }}
      </h1>

      <!-- <div class="flex items-center gap-8 mb-12">
        <span class="text-4xl font-black text-gray-900">${{ selectedDryFruit.price }}</span>
        <button
          [style.backgroundColor]="selectedDryFruit.color"
          class="group flex items-center gap-3 text-white px-10 py-4 rounded-2xl font-bold transition-all hover:brightness-110 hover:shadow-2xl hover:-translate-y-1">
          Add to Cart
          <span class="group-hover:translate-x-1 transition-transform">→</span>
        </button>
      </div> -->

      <div class="flex gap-4">
        <div *ngFor="let dryFruit of dryFruits"
          (click)="selectDryFruit(dryFruit)"
          [style.borderColor]="selectedDryFruit === dryFruit ? dryFruit.color : 'transparent'"
          class="group relative w-20 h-20 rounded-2xl cursor-pointer p-1 border-2 transition-all duration-300 hover:scale-110">
          <img
            [src]="dryFruit.image"
            class="w-full h-full object-cover rounded-xl"
            [alt]="dryFruit.name">
        </div>
      </div>
    </div>

    <div class="relative order-1 md:order-2 flex justify-center items-center">
      <div
        [style.backgroundColor]="selectedDryFruit.blobColor"
        class="absolute w-[80%] h-[80%] rounded-full blur-[100px] opacity-60 animate-pulse transition-colors duration-1000">
      </div>

      <div class="relative z-10 p-8">
        <img
          [src]="selectedDryFruit.name"
          [src]="selectedDryFruit.image"
          class="w-full max-w-125 h-auto object-contain drop-shadow-[0_35px_35px_rgba(0,0,0,0.25)] animate-float"
          [alt]="selectedDryFruit.name">
      </div>
    </div>

  </main>
</div>
