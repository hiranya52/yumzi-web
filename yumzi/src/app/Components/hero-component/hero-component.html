<nav
  class="sticky top-6 mx-auto w-[92%] rounded-full z-50 bg-white/70 backdrop-blur-lg no-border shadow-2xl shadow-pink-500/10 flex justify-between items-center px-8 py-3 max-w-7xl">
  <div class="text-3xl font-black text-pink-600 dark:text-pink-400 italic font-['Plus_Jakarta_Sans'] tracking-tight">
    Yumzi</div>
  <div class="hidden md:flex gap-8 items-center">
    <a class="text-pink-600 dark:text-pink-400 font-extrabold hover:scale-105 hover:text-pink-500 transition-all duration-300"
      href="#">Snacks</a>
    <a class="text-purple-900 dark:text-pink-100 font-medium hover:scale-105 hover:text-pink-500 transition-all duration-300"
      href="#">Benefits</a>
    <a class="text-purple-900 dark:text-pink-100 font-medium hover:scale-105 hover:text-pink-500 transition-all duration-300"
      href="#">Vibe Check</a>
  </div>
  <button
    class="bg-primary text-on-primary px-6 py-2 rounded-full font-bold scale-105 active:scale-95 transition-transform">
    Shop Now
  </button>
</nav>

<div [style.backgroundColor]="selectDryFruit.bgColor"
  class="min-h-screen flex items-center justify-center p-4 transition-colors duration-700">


  <!-- <div class="bg-white/70 backdrop-blur-md w-full max-w-5xl rounded-[40px] shadow-2xl overflow-hidden relative border border-white/50"> -->

  <main class="flex flex-col md:flex-row items-center px-12 pb-16 relative">


    <div class="md:w-1/2 z-10 space-y-6">
      <h1 [style.color]="selectedDonut.color" class="text-7xl font-extrabold leading-tight transition-all duration-500">
        {{ selectedDonut.name }}
      </h1>

      <div class="flex items-center space-x-1 text-yellow-400 text-xl">
        <span>★</span><span>★</span><span>★</span><span>★</span><span>★</span>
      </div>

      <div class="text-3xl font-bold text-gray-800">$ {{ selectedDonut.price }}</div>

      <p class="text-gray-500 max-w-sm leading-relaxed min-h-20">
        {{ selectedDonut.description }}
      </p>

      <button [style.backgroundColor]="selectedDonut.color"
        class="text-white px-8 py-3 rounded-xl font-bold transition-all shadow-lg hover:brightness-110 active:scale-95">
        Order Now
      </button>

      <div class="flex space-x-4 mt-12">
        <img *ngFor="let donut of donuts" [src]="donut.image" (click)="selectDonut(donut)"
          [ngClass]="{'border-4 border-white shadow-xl scale-110': selectedDonut === donut}"
          class="w-16 h-16 rounded-full cursor-pointer object-cover transition-all hover:scale-105" [alt]="donut.name">
      </div>
    </div>

    <div class="md:w-1/2 flex justify-center relative mt-12 md:mt-0">
      <div [style.backgroundColor]="selectedDonut.blobColor"
        class="absolute inset-0 rounded-full blur-3xl z-0 scale-125 transition-colors duration-700">
      </div>

      <img [src]="selectedDonut.image"
        class="w-105 h-105 object-contain drop-shadow-2xl z-10 transition-all duration-500 transform rotate-12 hover:rotate-0"
        [alt]="selectedDonut.name">
    </div>
  </main>
  <!-- </div> -->
</div>
